# logrotate config for SEPA signal scanner
# Copy to /etc/logrotate.d/sepa on the mini PC

/opt/sepa/data/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 640 sepa sepa
    # Signal the sepa service that logs have rotated (no-op for oneshot but harmless)
    postrotate
        systemctl kill --signal=HUP sepa-daily.service 2>/dev/null || true
    endscript
}
